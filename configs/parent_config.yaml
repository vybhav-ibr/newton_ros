world:
  name: plane
  world_type: plane
  height: 0.0
  cfg:
    density: 1000.0
    ke: 2.5e3
    kd: 100.0
    kf: 1000.0
    ka: 0.0
    mu: 1.0
    restitution: 0.0
  color: [0.125, 0.125, 0.15]
  label: null

###############################
# soft cfg
###############################
cfg:  &default_soft_cfg
  is_soft: true
  vertices: null
  indices: null
  density: 100.0
  k_mu: 1.0e6
  k_lambda: 1.0e6
  k_damp: 1.0e-6
  tri_ke: 0.0
  tri_ka: 0.0
  tri_kd: 0.0
  tri_drag: 0.0
  tri_lift: 0.0
  add_surface_mesh_edges: true
  edge_ke: 0.0
  edge_kd: 0.0
  particle_radius: 0.005

##############################
# rigid cfg
##############################
cfg: &default_rigid_cfg
  density: 1200.0
  ke: 2500.0
  kd: 150.0
  kf: 800.0
  ka: 10.0
  mu: 0.9
  restitution: 0.1
  mu_torsional: 0.01
  mu_rolling: 0.0002
  margin: 0.01
  gap: 0.001
  is_solid: true
  collision_group: 2
  collision_filter_parent: true
  has_shape_collision: true
  has_particle_collision: false
  is_visible: true
  is_site: false
  sdf_narrow_band_range: [-0.05, 0.05]
  sdf_target_voxel_size: 0.002
  sdf_max_resolution: 128
  sdf_texture_format: "uint16"
  is_hydroelastic: true
  kh: 1.0e9

objects:
  body_ellpsoid:
    type: ellipsoid
    body: -1
    pos: [0.0, 0.0, 0.0]
    quat: [0.0, 0.0, 0.0, 1.0]
    rx: 1.0
    ry: 0.75
    rz: 0.5
    cfg: *default_rigid_cfg
    as_site: false
    color: [1.0, 0.0, 0.0, 1.0]
    label: "ellipsoid_1"

  body_box:
    type: box
    body: -1
    fixed: false
    pos: [1.0, 0.0, 0.0]
    quat: [0.0, 0.0, 0.0, 1.0]
    hx: 0.5
    hy: 0.5
    hz: 0.5
    cfg: *default_rigid_cfg
    as_site: true
    color: [0.0, 1.0, 0.0, 1.0]
    label: "box_1"

  body_capsule:
    type: capsule
    fixed: false
    body: "body_capsule"
    pos: [2.0, 0.0, 0.0]
    quat: [0.0, 0.0, 0.0, 1.0]
    radius: 0.3
    half_height: 1.0
    cfg: *default_soft_cfg
    as_site: false
    color: [0.0, 0.0, 1.0, 1.0]
    label: "capsule_1"
  
  body_cylinder:
    type: cylinder
    fixed: false
    body: -1
    pos: [3.0, 0.0, 0.5]
    quat: [0.0, 0.0, 0.0, 1.0]
    radius: 0.4
    half_height: 0.8
    cfg: *default_rigid_cfg
    as_site: false
    color: [1.0, 1.0, 0.0, 1.0]
    label: "cylinder_1"

  body_cone:
    type: cone
    fixed: false
    body: -1
    pos: [4.0, 0.0, 0.6]
    quat: [0.0, 0.0, 0.0, 1.0]
    radius: 0.5
    half_height: 1.2
    cfg: *default_rigid_cfg
    as_site: false
    color: [1.0, 0.5, 0.0, 1.0]
    label: "cone_1"

  body_sphere:
    type: sphere
    body: -1
    pos: [5.0, 0.0, 0.0]
    quat: [0.0, 0.0, 0.0, 1.0]
    radius: 0.6
    cfg: *default_rigid_cfg
    as_site: false
    color: [0.5, 0.5, 1.0, 1.0]
    label: "sphere_1"

##############################
# model cfg (URDF, MJCF, USD)
##############################
model_cfg: &default_model_cfg
  pos: [0.0, 0.0, 0.5]
  euler: [0.0, 0.0, 0.0]
  # quat: [1.0, 0.0, 0.0, 0.0]
  floating: false
  base_joint: null
  parent_body: -1
  force_show_colliders: false
  enable_self_collisions: true
  collapse_fixed_joints: false
  mesh_maxhullvert: null
  override_root_xform: false
  namespace: "example"
  description: "An example model entity"

# Example URDF (Uses default_model_cfg anchor)
example_urdf: &default_urdf_cfg
  <<: *default_model_cfg
  type: urdf
  source: "path/to/model.urdf"
  scale: 1.0
  hide_visuals: false
  parse_visuals_as_colliders: false
  up_axis: "Z"
  ignore_inertial_definitions: false
  joint_ordering: "dfs"
  bodies_follow_joint_ordering: true
  force_position_velocity_actuation: false
  tags: ["example", "robot"]
  category: 1

# Example MJCF (Uses default_model_cfg anchor)
example_mjcf: &default_mjcf_cfg
  <<: *default_model_cfg
  type: mjcf
  source: "path/to/model.xml"
  armature_scale: 1.0
  scale: 1.0
  hide_visuals: false
  parse_visuals_as_colliders: false
  parse_meshes: true
  parse_sites: true
  parse_visuals: true
  parse_mujoco_options: true
  up_axis: "Z"
  ignore_names: []
  ignore_classes: []
  visual_classes: ["visual"]
  collider_classes: ["collision"]
  no_class_as_colliders: true
  ignore_inertial_definitions: false
  verbose: false
  skip_equality_constraints: false
  convert_3d_hinge_to_ball_joints: false
  ctrl_direct: false

# Example USD (Uses default_model_cfg anchor)
example_usd: &default_usd_cfg
  <<: *default_model_cfg
  type: usd
  source: "path/to/model.usd"
  only_load_enabled_rigid_bodies: false
  only_load_enabled_joints: true
  joint_drive_gains_scaling: 1.0
  verbose: false
  ignore_paths: null
  apply_up_axis_from_stage: false
  root_path: "/"
  joint_ordering: "dfs"
  bodies_follow_joint_ordering: true
  skip_mesh_approximation: false
  load_sites: true
  load_visual_shapes: true
  hide_collision_shapes: false
  parse_mujoco_options: true
  force_position_velocity_actuation: false

robots:
  robot_one:
    visualize_contact: true
    namespace: "robot"
    <<: *default_urdf_cfg
    source:  "path/to/ackerman.urdf"
    pos: [0.0, 0.0, 0.1]
    euler: [0.0, 0.0, 0.0]
    
    control:
      joint_commands_topic: joint_commands
      joint_commands_topic_frequency: 50
      joint_states_topic: joint_states
      joint_states_topic_frequency: 50
      joint_control_topic: joint_control
      joint_control_topic_frequency: 50
      joint_properties:
        left_wheel_steering_joint:
          kp: 30
          kv: 30
          stiffness: 10.0
          damping: 5.0
          armature: 0.0
          force_range: [-1000.0, 1000.0]
          command: position
        rear_left_wheel_joint:
          kp: 50
          kv: 50
          stiffness: 10.0
          damping: 5.0
          armature: 0.0
          force_range: [-1000.0, 1000.0]
          command: velocity
        rear_right_wheel_joint:
          kp: 50
          kv: 50
          stiffness: 10.0
          damping: 50.0
          armature: 0.0
          force_range: [-1000.0, 1000.0]
          command: velocity
        right_wheel_steering_joint:
          kp: 30
          kv: 30
          stiffness: 10.0
          damping: 5.0
          armature: 0.0
          force_range: [-1000.0, 1000.0]
          command: position
    
    sensors: []



  
